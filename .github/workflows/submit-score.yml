name: Submit Score to Leaderboard

# Déclenché par le client via l'API GitHub (workflow_dispatch)
# Le GIST_TOKEN reste 100% côté serveur (secret), jamais exposé au client.
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nom du joueur (max 10 car.)'
        required: true
        default: 'AAA'
      score:
        description: 'Score à enregistrer'
        required: true
        default: '0'

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        run: |
          # Sanitize : nom ≤ 10 chars alphanumériques, score entier positif
          NAME="${{ github.event.inputs.name }}"
          SCORE="${{ github.event.inputs.score }}"
          if ! [[ "$SCORE" =~ ^[0-9]{1,9}$ ]]; then
            echo "::error::Score invalide : $SCORE"
            exit 1
          fi
          if [ ${#NAME} -gt 10 ]; then
            echo "::error::Nom trop long : $NAME"
            exit 1
          fi
          echo "✅ Inputs valides : $NAME / $SCORE"

      - name: Update Gist leaderboard
        env:
          GIST_TOKEN:  ${{ secrets.GIST_TOKEN }}
          GIST_ID:     ${{ vars.GIST_ID }}
          PLAYER_NAME: ${{ github.event.inputs.name }}
          PLAYER_SCORE: ${{ github.event.inputs.score }}
        run: |
          node << 'EOF'
          const https = require('https');

          const GIST_TOKEN  = process.env.GIST_TOKEN;
          const GIST_ID     = process.env.GIST_ID;
          const GIST_FILE   = 'snake_scores.json';
          const playerName  = process.env.PLAYER_NAME.substring(0, 10).toUpperCase();
          const playerScore = parseInt(process.env.PLAYER_SCORE, 10);

          if (isNaN(playerScore)) {
            console.error('Score invalide'); process.exit(1);
          }

          function ghRequest(method, path, body) {
            return new Promise((resolve, reject) => {
              const payload = body ? JSON.stringify(body) : null;
              const req = https.request({
                hostname: 'api.github.com',
                path,
                method,
                headers: {
                  'Authorization': `Bearer ${GIST_TOKEN}`,
                  'Accept': 'application/vnd.github+json',
                  'User-Agent': 'SnakeJS-Leaderboard',
                  ...(payload ? {
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(payload),
                  } : {}),
                },
              }, res => {
                let raw = '';
                res.on('data', c => raw += c);
                res.on('end', () => {
                  if (res.statusCode >= 400) {
                    reject(new Error(`GitHub API ${res.statusCode}: ${raw}`));
                  } else {
                    resolve(raw ? JSON.parse(raw) : null);
                  }
                });
              });
              req.on('error', reject);
              if (payload) req.write(payload);
              req.end();
            });
          }

          async function main() {
            // 1. Lire les scores actuels
            const gist = await ghRequest('GET', `/gists/${GIST_ID}`);
            let scores = [];
            try {
              const content = gist.files?.[GIST_FILE]?.content;
              if (content) scores = JSON.parse(content);
            } catch (e) {
              console.warn('Gist vide ou invalide, on repart de zéro.');
            }

            // 2. Ajouter, trier, garder top 10
            scores.push({ name: playerName, score: playerScore });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 10);

            // 3. Écrire dans le Gist
            await ghRequest('PATCH', `/gists/${GIST_ID}`, {
              files: {
                [GIST_FILE]: { content: JSON.stringify(scores, null, 2) },
              },
            });

            console.log('✅ Leaderboard mis à jour :');
            console.table(scores);
          }

          main().catch(e => { console.error(e.message); process.exit(1); });
          EOF
