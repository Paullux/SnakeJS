name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config into leaderboard.js
        env:
          ACTIONS_TOKEN: ${{ vars.ACTIONS_TOKEN }}
          GIST_ID:       ${{ vars.GIST_ID }}
          REPO_OWNER:    ${{ github.repository_owner }}
          REPO_NAME:     ${{ github.event.repository.name }}
        run: |
          sed -i "s|__ACTIONS_TOKEN__|${ACTIONS_TOKEN}|g" leaderboard.js
          sed -i "s|__GIST_ID__|${GIST_ID}|g"             leaderboard.js
          sed -i "s|__REPO_OWNER__|${REPO_OWNER}|g"        leaderboard.js
          sed -i "s|__REPO_NAME__|${REPO_NAME}|g"          leaderboard.js
          echo "✅ Config injectée (GIST_TOKEN reste secret, jamais exposé)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
