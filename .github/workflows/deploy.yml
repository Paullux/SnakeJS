name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Gist config into leaderboard.js
        env:
          GIST_TOKEN: ${{ vars.GIST_TOKEN }}
          GIST_ID:    ${{ vars.GIST_ID }}
        run: |
          sed -i "s|__GIST_TOKEN__|${GIST_TOKEN}|g" leaderboard.js
          sed -i "s|__GIST_ID__|${GIST_ID}|g"       leaderboard.js
          echo "✅ Gist config injected"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
